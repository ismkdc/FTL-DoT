name: FTL-DoT Build & Release

on:
  push:
    branches: ['feature/native-dot', 'master', 'development']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # needed for GitHub Release upload

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            ftlarch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            ftlarch: arm64
          - arch: armv7
            runner: ubuntu-latest
            platform: linux/arm/v7
            ftlarch: armv7
          - arch: armv6
            runner: ubuntu-latest
            platform: linux/arm/v6
            ftlarch: armv6
          - arch: riscv64
            runner: ubuntu-latest
            platform: linux/riscv64
            ftlarch: riscv64

    steps:
      - name: Checkout FTL-DoT
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so git describe works for FTL version embed

      - name: Set up QEMU
        if: matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build pihole-FTL binary for ${{ matrix.arch }}
        env:
          GIT_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          GIT_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e GIT_TAG="${{ github.ref_type == 'tag' && github.ref_name || '' }}" \
            -e GIT_VERSION="${{ github.ref_type == 'tag' && github.ref_name || '' }}" \
            alpine:3.24 \
            sh -c "
              set -ex
              apk add --no-cache \
                build-base cmake git \
                mbedtls-dev mbedtls-static \
                libcap-dev libcap-static \
                nettle-dev nettle-static \
                gmp-dev gmp-static \
                lua5.4-dev \
                sqlite-dev sqlite-static \
                libevent-dev libevent-static \
                libidn2-dev libidn2-static \
                libunistring-dev libunistring-static \
                readline-dev readline-static ncurses-static \
                xxd \
                ca-certificates

              # Allow git to operate on the mounted workspace (owned by runner, not root)
              git config --global --add safe.directory /src

              mkdir -p /tmp/ftl-build
              cd /tmp/ftl-build
              cmake /src \
                -DCMAKE_BUILD_TYPE=Release \
                -DSTATIC=true
              make -j\$(nproc) pihole-FTL

              # Static build: no runtime dependency on the host's libc, so
              # the same binary works both inside this Alpine/musl-based
              # Docker image and on a glibc bare-metal install (Debian,
              # Ubuntu, ...) via the official pi-hole installer's FTL
              # download step.
              file pihole-FTL

              # CMakeLists.txt's own POST_BUILD step already appended the
              # self-integrity footer FTL's verify_FTL() expects: a 9-byte
              # \"sha256sum\" marker followed by the 32-byte SHA256 of
              # everything before it. Stripping afterwards would discard
              # those trailing bytes (they aren't part of any ELF section),
              # so don't strip and don't re-append our own checksum here,
              # that used to write just a bare 32-byte hash with no marker,
              # which verify_FTL() silently rejected as \"no checksum mark\".
              SHA256=\$(sha256sum pihole-FTL | cut -d' ' -f1)
              echo \"SHA256 (includes self-integrity footer): \$SHA256\"

              # pi-hole/pi-hole's own installer (FTLinstall() in
              # automated install/basic-install.sh) verifies the download
              # against a companion <binary>.sha1 file, not the embedded
              # footer. It runs \"sha1sum -c <binary>.sha1\" in the directory
              # where it just downloaded the binary under its final name
              # (pihole-FTL-<arch>), so the checksum line must reference
              # that exact filename, not just be a bare hash.
              SHA1=\$(sha1sum pihole-FTL | cut -d' ' -f1)
              echo \"\${SHA1}  pihole-FTL-${{ matrix.ftlarch }}\" > pihole-FTL.sha1

              cp pihole-FTL /src/pihole-FTL-${{ matrix.ftlarch }}
              cp pihole-FTL.sha1 /src/pihole-FTL-${{ matrix.ftlarch }}.sha1
              chmod +x /src/pihole-FTL-${{ matrix.ftlarch }}
            "

      - name: Smoke test (amd64 only)
        if: matrix.arch == 'amd64'
        run: |
          # Run on a plain glibc base (not Alpine) with none of the build
          # deps installed, to confirm the static binary really has no
          # runtime library requirements and works on a bare-metal-style
          # host, not just inside the Alpine image it was built in.
          docker run --rm --platform linux/amd64 \
            -v "${{ github.workspace }}:/work" \
            debian:bookworm-slim \
            sh -c "
              echo '=== Version (glibc host, no deps installed) ==='
              /work/pihole-FTL-amd64 --version
              echo '=== DoT symbols ==='
              grep -qa 'dot_global_init' /work/pihole-FTL-amd64 && echo 'DoT: OK' || { echo 'DoT: NOT FOUND'; exit 1; }
              echo '=== sha1 matches (same check the pi-hole installer runs) ==='
              cd /work && sha1sum --status --quiet -c pihole-FTL-amd64.sha1 || { echo 'sha1 MISMATCH'; exit 1; }
              echo 'sha1: OK'
            "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: pihole-FTL-${{ matrix.ftlarch }}
          path: |
            pihole-FTL-${{ matrix.ftlarch }}
            pihole-FTL-${{ matrix.ftlarch }}.sha1
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: binaries/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          name: "FTL-DoT ${{ github.ref_name }}"
          body: |
            ## FTL-DoT ${{ github.ref_name }}

            Fork of [pi-hole/FTL](https://github.com/pi-hole/FTL) with native DNS-over-TLS (RFC 7858) support.

            ### What's new
            - `tls-server=<ip>#<port>#<hostname>` dnsmasq directive
            - `tls://ip#port#hostname` format in `dns.upstreams` FTLCONF
            - mbedTLS with ALPN "dot", TLS 1.2+, cert verification, session resumption
            - Statically linked: same binary works in the Docker image and on a bare-metal install (each release includes a `<binary>.sha1` file, same layout the official pi-hole installer's `FTLinstall()` expects)

            ### Usage
            ```yaml
            # docker-compose.yml
            environment:
              FTLCONF_dns_upstreams: '["tls://8.8.8.8#853#dns.google","tls://8.8.4.4#853#dns.google"]'
            ```

            ### Binaries
            | File | Architecture |
            |------|-------------|
            | pihole-FTL-amd64 | x86-64 |
            | pihole-FTL-arm64 | ARM 64-bit |
            | pihole-FTL-armv7 | ARM 32-bit v7 |
            | pihole-FTL-armv6 | ARM 32-bit v6 |
            | pihole-FTL-riscv64 | RISC-V 64-bit |
          files: binaries/*
          draft: false
          prerelease: false
