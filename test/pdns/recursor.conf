dnssec:
  validation: process-no-validate
incoming:
  listen:
  - 127.0.0.1:5555
recursor:
  forward_zones:
  - zone: ftl
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  - zone: 168.192.in-addr.arpa
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  - zone: ip6.arpa
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  - zone: dnssec
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  - zone: bogus
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  # Resolve Apple's iCloud Private Relay zones from the local authoritative
  # server (see test/pdns/setup.sh) instead of the public internet, keeping
  # the mask.icloud.com query counts deterministic.
  - zone: icloud.com
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  - zone: apple-dns.net
    recurse: false
    forwarders:
    - 127.0.0.1:5554
  lua_dns_script: /etc/pdns/luadns.lua